<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Whispera Client</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="app-container">
        <div class="glass-card">
            <div class="header">
                <div class="logo-container">
                    <i class="fas fa-shield-alt logo-icon"></i>
                </div>
                <h1>Whispera</h1>
                <p class="subtitle">Secure & Fast VPN Client</p>
            </div>

            <div class="connection-panel">
                <div class="input-group">
                    <i class="fas fa-key input-icon"></i>
                    <input type="text" id="connectionKey" placeholder="Paste connection key (whispera://...)" autocomplete="off">
                </div>

                <div class="status-indicator" id="statusIndicator">
                    <div class="status-dot"></div>
                    <span class="status-text">Disconnected</span>
                </div>

                <button id="connectBtn" class="btn-primary">
                    <span class="btn-content">
                        <i class="fas fa-power-off"></i>
                        <span id="btnText">Connect</span>
                    </span>
                    <div class="loader" style="display: none;"></div>
                </button>
            </div>

            <div class="footer">
                <button class="icon-btn" title="Settings"><i class="fas fa-cog"></i></button>
                <button class="icon-btn" title="Logs"><i class="fas fa-file-alt"></i></button>
                <button class="icon-btn" title="Help"><i class="fas fa-question-circle"></i></button>
            </div>
        </div>
    </div>
    <script src="main.js"></script>
</body>
</html>
