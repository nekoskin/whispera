# Whispera Mihomo Configuration
# Auto-generated - Do not edit manually

# Mixed port for HTTP/SOCKS5 proxy (not used directly, traffic goes through TUN)
mixed-port: 7890

# Allow connections from LAN
allow-lan: false

# Bind address
bind-address: '127.0.0.1'

# Mode: rule (rule-based), global (all through proxy), direct (bypass all)
mode: rule

# Log level: silent, error, warning, info, debug
log-level: info

# External controller for API
external-controller: 127.0.0.1:9090

# GeoIP database
geodata-mode: true
geo-auto-update: true
geo-update-interval: 24

# DNS Configuration - Critical for TUN mode
dns:
  enable: true
  listen: 0.0.0.0:1053
  ipv6: false
  enhanced-mode: fake-ip
  fake-ip-range: 198.18.0.1/16
  fake-ip-filter:
    - '*.lan'
    - '*.local'
    - 'localhost.ptlogin2.qq.com'
    - '+.stun.*.*'
    - '+.stun.*.*.*'
    - '+.stun.*.*.*.*'
    - '+.stun.*.*.*.*.*'
    - 'lens.l.google.com'
    - 'stun.l.google.com'
    - 'time.windows.com'
    - 'time.nist.gov'
    - 'time.apple.com'
    - 'time.asia.apple.com'
    - '*.ntp.org.cn'
    - '+.pool.ntp.org'
    - 'time1.cloud.tencent.com'
  default-nameserver:
    - 8.8.8.8
    - 1.1.1.1
  nameserver:
    - 'tls://8.8.8.8#PROXY'
    - 'tls://1.1.1.1#PROXY'
  fallback:
    - 'https://1.1.1.1/dns-query#PROXY'
    - 'https://8.8.8.8/dns-query#PROXY'
  fallback-filter:
    geoip: true
    geoip-code: RU
    ipcidr:
      - 240.0.0.0/4

# TUN Configuration - The core of network interception
tun:
  enable: true
  stack: gvisor  # gvisor for better isolation, system for performance
  auto-route: true
  auto-detect-interface: true
  dns-hijack:
    - any:53
    - tcp://any:53
  device: Whispera
  mtu: 1500
  strict-route: false
  inet4-route-address:
    - 0.0.0.0/0
  inet6-route-address:
    - '::/0'
  inet4-route-exclude-address: []
  inet6-route-exclude-address: []
  include-uid: []
  exclude-uid: []
  include-package: []
  exclude-package: []

# Sniffer for domain detection
sniffer:
  enable: true
  force-dns-mapping: true
  parse-pure-ip: true
  override-destination: true
  sniff:
    HTTP:
      ports: [80, 8080-8880]
      override-destination: true
    TLS:
      ports: [443, 8443]
    QUIC:
      ports: [443, 8443]

# Profile settings
profile:
  store-selected: true
  store-fake-ip: true

# Unified Delay for proxy testing
unified-delay: true

# TCP Concurrent for faster connection
tcp-concurrent: true

# Global Client Fingerprint
global-client-fingerprint: chrome

# Proxy Groups
proxy-groups:
  - name: PROXY
    type: select
    proxies:
      - Whispera

# Proxies - Whispera SOCKS5 server
proxies:
  - name: Whispera
    type: socks5
    server: 127.0.0.1
    port: 10800
    udp: true

# Rules
rules:
  - IP-CIDR,10.0.0.0/8,DIRECT,no-resolve
  - IP-CIDR,172.16.0.0/12,DIRECT,no-resolve
  - IP-CIDR,192.168.0.0/16,DIRECT,no-resolve
  - IP-CIDR,127.0.0.0/8,DIRECT,no-resolve
  - IP-CIDR,100.64.0.0/10,DIRECT,no-resolve
  - IP-CIDR,224.0.0.0/4,DIRECT,no-resolve
  - IP-CIDR,fe80::/10,DIRECT,no-resolve
  - IP-CIDR,::1/128,DIRECT,no-resolve
  - DOMAIN-SUFFIX,local,DIRECT
  - DOMAIN-SUFFIX,lan,DIRECT
  - DOMAIN-KEYWORD,localhost,DIRECT
  - MATCH,PROXY
