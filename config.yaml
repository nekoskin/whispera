transport:
  udp:
    enabled: true
    listen_addr: ":8443"
    max_packet_size: 65535
    buffer_size: 4194304
    workers: 16

obfuscation:
  enabled: true
  ml_enabled: true
  default_profile: "ml"

network:
  tun_name: "Whispera"
  tun_ip: "198.18.0.1"
  tun_mtu: 1500
  dns: "1.1.1.1"

session:
  max_sessions: 10000
  idle_timeout: 300
  cleanup_interval: 60

rate_limit:
  handshake: 100
  packets: 10000000

logging:
  level: "info"
  format: "json"

api:
  enabled: true
  listen_addr: ":8080"
  web_root: ""
  enable_cors: true
  auth_token: "whispera_admin_token"
  admin_username: "admin"
  admin_password: "admin"

chameleon:
  enabled: true
  listen_addr: ":443"
  domain: ""
  acme_dir: "/var/lib/whispera/acme"
  tls_cert: ""
  tls_key: ""
  decoy_origin: ""
