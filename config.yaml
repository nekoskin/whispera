inbounds:
  - tag: "tcp-main"
    protocol: "whispera"
    listen: "0.0.0.0"
    port: 8444
    stream_settings:
      network: "tcp"
      security: "none"

  - tag: "websocket-main"
    protocol: "whispera"
    listen: "0.0.0.0"
    port: 8445
    stream_settings:
      network: "websocket"
      security: "none"
      ws:
        path: "/ws"

transport:
  selector_mode: "auto"

  udp:
    enabled: true
    listen_addr: ":8443"
    max_packet_size: 65535
    buffer_size: 4194304
    workers: 16

obfuscation:
  enabled: true
  ml_enabled: true
  default_profile: "ml"

network:
  tun_name: "Whispera"
  tun_ip: "198.18.0.1"
  tun_mtu: 1500
  dns: "1.1.1.1"

session:
  max_sessions: 10000
  idle_timeout: 300
  cleanup_interval: 60

rate_limit:
  handshake: 100
  packets: 10000000

logging:
  level: "info"
  format: "json"

metrics:
  enabled: true
  listen_addr: ":9090"
  path: "/metrics"

api:
  enabled: true
  listen_addr: ":8080"
  web_root: "c:/Whispera-main/web"
  enable_cors: true
  auth_token: "whispera_admin_token"
  admin_username: "admin"
  admin_password: "admin"

chameleon:
  enabled: true
  listen_addr: ":443"
  # Автоматический сертификат Let's Encrypt (рекомендуется):
  domain: ""          # e.g. "vpn.example.com" — заполнить домен сервера
  acme_dir: "/var/lib/whispera/acme"
  # Либо ручные пути к сертификату (приоритет над domain):
  tls_cert: ""
  tls_key: ""
  # decoy_origin: upstream для всех не-VPN запросов (любой GET, неавторизованный POST).
  # Указывайте, если на 443 раньше стоял публичный сайт через nginx — перенесите nginx
  # на loopback (например 127.0.0.1:80) и пропишите сюда:
  #   decoy_origin: "http://127.0.0.1:80"
  # Если пусто — chameleon отдаст встроенные decoy-страницы.
  decoy_origin: ""
