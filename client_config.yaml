# Whispera Client Configuration
client:
  server: "YOUR_SERVER_IP:51820"
  server_tcp: "YOUR_SERVER_IP:4443"
  server_ws: "YOUR_SERVER_IP:8443"
  server_pub: "YOUR_SERVER_PUBLIC_KEY"
  tun: "Ethernet 5"  # Windows TUN interface
  metrics: ":9102"
  auto_switch: true
  dual_mode: true
  obfs_preset: "quic"
  handshake_timeout: "5s"
  udp_upgrade_sec: 10

# Speedtest configuration
speedtest:
  enabled: true
  server: "http://YOUR_SERVER_IP:8080"
  interval: "5m"

# Obfuscation settings
obfuscation:
  fte_profile: "http2"
  marionette_profile: "browser"
  ai_evasion: true
  hardware_evasion: true
  behavioral_mimicry: true

# Monitoring
monitoring:
  enabled: true
  metrics_port: 9102
  pprof_port: 6061
