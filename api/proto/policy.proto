syntax = "proto3";

package whispera.policy.v1;

option go_package = "whispera/api/gen/policy/v1;policyv1";

service PolicyService {
  rpc GetClientConfig(GetClientConfigRequest)
      returns (GetClientConfigResponse);

  rpc StreamConfigUpdates(StreamConfigUpdatesRequest)
      returns (stream ConfigUpdate);
}

message GetClientConfigRequest {
  string client_id = 1;
  string app_profile = 2;
  string platform = 3;
  string version = 4;
}

message GetClientConfigResponse {
  string client_id = 1;
  bytes config_blob = 2; // serialized YAML/JSON as today
  uint64 revision = 3;
  uint64 expires_at_unix = 4;
}

message StreamConfigUpdatesRequest {
  string client_id = 1;
  string app_profile = 2;
}

message ConfigUpdate {
  uint64 revision = 1;
  bytes config_blob = 2;
  uint64 timestamp_unix = 3;
}


