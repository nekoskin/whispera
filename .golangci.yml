version: "2"

run:
  timeout: 5m
  tests: true
  modules-download-mode: readonly

linters:
  enable:
    - dogsled
    - errcheck
    - exhaustive
    - gochecknoinits
    - goprintffuncname
    - govet
    - ineffassign
    - misspell
    - nakedret
    - noctx
    - whitespace
    - unused
  disable:
    - funlen
    - gocyclo
    - nestif
    - unconvert
    - unparam
    - nolintlint
    - gosec
    - lll
    - prealloc
    - goconst
    - revive
    - gocritic
    - staticcheck
    - gochecknoinits
  settings:
    exhaustive:
      default-signifies-exhaustive: true
    gocyclo:
      min-complexity: 100
    misspell:
      locale: US
  exclusions:
    presets:
      - std-error-handling
    rules:
      - linters: [errcheck]
        text: "SetDeadline|SetReadDeadline|SetWriteDeadline|SetKeepAlive|SetNoDelay|SetReadBuffer|SetWriteBuffer|SetKeepAlivePeriod"
      - linters: [errcheck]
        text: "Write|Encode"
      - linters: [errcheck]
        text: "CloseWithError"
      - linters: [errcheck]
        text: "io\\.Copy"
      - linters: [errcheck]
        text: "Rollback|rollback"
      - linters: [errcheck]
        text: "Register"
      - linters: [errcheck]
        text: "\\.Stop|Stop\\b|Shutdown"
      - linters: [errcheck]
        text: "Unsubscribe|Drain|Publish"
      - linters: [errcheck]
        text: "sendReply|sendFrame"
      - linters: [errcheck]
        text: "SendNotification|Send\\b"
      - linters: [errcheck]
        text: "Chmod|MkdirAll|WriteFile|Seek"
      - linters: [errcheck]
        text: "SwitchProfile|LearnFromTraffic|InjectFault|ProcessOutbound"
      - linters: [errcheck]
        text: "Reconnect|SetActiveService|Disable|GetOrCreateStream|DecryptHeader|CheckBridgeNow|CreateBackup|Signal|setState"
      - linters: [errcheck]
        text: "loadAccessKeys|AddICECandidate|SetLocalDescription|SetRemoteDescription"
      - linters: [errcheck]
        text: "api\\.Send"
      - linters: [errcheck]
        text: "fsm\\.Event"
      - linters: [errcheck]
        text: "optimizeFor|optimizeListener"
      - linters: [errcheck]
        text: "ListenAndServe|ServeTLS|Serve\\b"
      - linters: [errcheck]
        text: "Sscanf|Decode|Release|Persist|persist|writeWithRetry|tcpConn\\.Read|reader\\.Read"
      - linters: [errcheck]
        text: "cmd\\.|Parse\\b"
      - linters: [errcheck]
        path: "yatelemost|vkwebrtc"
      - linters: [errcheck]
        path: "correlation|marionette"
      - linters: [errcheck]
        path: "server/dynamic"
      - linters: [unused]
        text: "field .* is unused"
      - path: _test\.go
        linters: [funlen, gocyclo]
      - path: cmd/
        linters: [funlen, gocyclo, nestif, goconst, gocritic]

issues:
  max-issues-per-linter: 100
  max-same-issues: 50
