# Whispera Modular Server Configuration
# This is an example configuration file

server:
  name: "whispera-server"
  listen_addr: ":51820"
  tun_name: "tun0"
  mtu: 1420
  workers: 8
  graceful_stop: 30s

transport:
  udp:
    enabled: true
    listen_addr: ":51820"
    max_packet_size: 65535
    buffer_size: 4096
    workers: 8
  tcp:
    enabled: false
    listen_addr: ":51821"
  websocket:
    enabled: false
    listen_addr: ":443"
    path: "/ws"
  xhttp:
    enabled: false
    listen_addr: ":443"
    mode: "stream-one"
    max_concurrency: 100

session:
  max_sessions: 10000
  session_timeout: 30m
  cleanup_interval: 1m
  keepalive_interval: 30s
  rekey_interval: 12h

routing:
  rules_file: ""
  default_route: "direct"
  geo:
    enabled: false
    geoip_file: ""
    geosite_file: ""
    update_interval: 24h
  dns:
    enabled: false
    upstream: "8.8.8.8:53"
    fakeip_range: "198.18.0.0/15"

obfuscation:
  enabled: true
  profile: "default"
  threat_level: 5
  padding:
    enabled: true
    min_size: 16
    max_size: 64
  chaff:
    enabled: false
    interval: 30s
    min_size: 32
    max_size: 128

api:
  enabled: true
  listen_addr: ":8080"
  auth_token: ""
  tls_cert: ""
  tls_key: ""

metrics:
  enabled: true
  listen_addr: ":9090"
  path: "/metrics"

logging:
  level: "info"
  format: "text"
  output: "stdout"
  file: ""
