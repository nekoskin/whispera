version: "2.0"

client:
  mode: "vpn" 
  log_level: "info"

connection:
  server_address: "vpn.example.com:443"
  transport: "udp" 
  keepalive_interval: 30s
  reconnect_interval: 5s
  max_reconnect_attempts: 10
  timeout: 30s

tun:
  enabled: true
  name: "whispera0"
  ip: "10.8.0.2"
  gateway: "10.8.0.1"
  netmask: "255.255.255.0"
  mtu: 1420
  buffer_size: 65535
  metric: 100

dns:
  enabled: true
  upstream: "1.1.1.1:53"
  fake_ip: true
  fake_ip_range: "198.18.0.0/15"
  cache_size: 10000
  block_ads: true

nat:
  enabled: true
  port_range_start: 10000
  port_range_end: 20000

crypto:
  cipher: "chacha20-poly1305"
  enable_key_pool: true

obfuscator:
  enabled: true
  profile: "randomized"
  threat_level: 5

metrics:
  enabled: true
  address: ":9091"
  path: "/metrics"

asn_bypass:
  enabled: false  
  strategy: "tls_masquerade"  
  tls_fingerprint: "chrome"   
  ja3_randomize: true      
  enable_ech: false        
  connection_burst: 5      
  burst_cooldown_ms: 2000  
