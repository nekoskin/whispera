

version: "2.0"


profile:
  name: "Discord VoIP"
  description: "Optimized for Discord voice calls with minimal latency"
  version: "1.0"
  target_apps: ["Discord"]


connection:
  
  transport: "udp"
  server_address: "${SERVER_ADDRESS:vpn.example.com:443}"
  
  
  timeout: 2s                     
  keepalive_interval: 15s         
  reconnect_interval: 1s          
  max_reconnect_attempts: 20
  
  
  udp:
    
    send_buffer_size: 2097152     
    recv_buffer_size: 2097152     
    
    
    no_delay: true                
    low_latency: true             
    dscp_class: "EF"              
    ecn_enabled: false            
    
    
    fragment_size: 1200           
    
    
    enable_gso: true              
    gso_segment_size: 1200


tun:
  enabled: true
  name: "whispera_voice"
  ip: "10.8.0.2"
  gateway: "10.8.0.1"
  netmask: "255.255.255.0"
  
  
  mtu: 1500                       
  
  buffer_size: 131072             
  metric: 50                      
  
  
  udp_receive_window: 262144      
  udp_send_window: 262144
qos:
  enabled: true
  mode: "voip"                    
  
  
  priority_queue:
    rtp_voice_capacity: 5000      
    rtp_video_capacity: 1000
    control_capacity: 500
    
    
    max_reorder_delay: 5ms
    strict_ordering: false        
  
  
  jitter_buffer:
    enabled: true
    min_jitter: 5ms
    max_jitter: 50ms
    target_jitter: 20ms           
    adapt_dynamic: true           
  
  
  bandwidth:
    max_bitrate: 384000           
    target_bitrate: 128000        
    adaptive: true                
    fallback_bitrate: 64000       
  
  
  fec_enabled: false              
  retransmit_timeout: 20ms        
  max_retransmits: 3


dns:
  enabled: true
  
  upstream: "1.1.1.1:53"
  backup_upstream: "8.8.8.8:53"
  
  fake_ip: true
  fake_ip_range: "198.18.0.0/15"
  cache_size: 20000
  
  
  cache_ttl: 3600
  min_ttl: 60
  cache_negative: true
  negative_ttl: 300


routing:
  enabled: true
  rules:
    
    - name: "discord_voip"
      protocol: "udp"
      port_range: "50000-65000"
      priority: 10
      action: "route_priority"
      metadata:
        application: "discord_voice"
        qos_class: "ef"
    
    
    - name: "discord_signaling"
      protocol: "tcp"
      port: 443
      priority: 5
      action: "route_normal"
      metadata:
        application: "discord"
    
    
    - name: "discord_api"
      host: "*.discord.com"
      priority: 5
      action: "route_normal"


crypto:
  cipher: "chacha20-poly1305"     
  enable_key_pool: true
  key_rotation_interval: 3600s    
  
  
  tls:
    version: "1.3"                
    ciphers: "TLS_CHACHA20_POLY1305_SHA256,TLS_AES_256_GCM_SHA384"


obfuscator:
  enabled: false                  
  


nat:
  enabled: true
  port_range_start: 10000
  port_range_end: 20000
  
  
  predict_ports: true
  prediction_window: 10


metrics:
  enabled: true
  address: ":9091"
  path: "/metrics"
  
  
  collect_latency: true
  collect_jitter: true
  collect_packet_loss: true
  
  
  report_interval: 5s
  
  
  save_history: true
  history_retention: 24h


voip:
  enabled: true
  
  
  detect_apps: true
  apps:
    - name: "Discord"
      port_ranges: ["50000-65000"]
      protocols: ["udp"]
      codec: "opus"
    
    - name: "Telegram VoIP"
      port_ranges: ["49152-65535"]
      protocols: ["udp"]
      codec: "opus"
  
  
  echo_cancellation_hint: true
  
  
  audio_codec: "opus"             
  audio_bitrate: 128000           
  audio_sample_rate: 48000        
  audio_channels: 1               


fallback:
  enabled: true
  timeout: 5s
  strategies:
    - transport: "tcp"
      priority: 2
    - transport: "ws"
      priority: 3


performance:
  
  num_workers: 0                  
  worker_priority: "high"         
  
  
  buffer_pool_size: 1000
  enable_memory_pooling: true
  gc_interval: 30s
  
  
  congestion_control: "cubic"     
  slow_start: true
  initial_cwnd: 10


logging:
  enabled: true
  level: "warn"                   
  output: "syslog"                
  
  
  log_packets: false
  packet_sample_rate: 0           
