version: "2.0"

service:
  listen_address: ":9090"
  log_level: "info"

session:
  ttl: "1h"
  timeout: "2h"
  max_sessions: 100000
  cleanup_interval: "1m"

crypto:
  cipher: "chacha20-poly1305"
  key_pool_size: 1000

database:
  type: "memory"
  dsn: ""

metrics:
  enabled: true
  address: ":9092"
  path: "/metrics"
