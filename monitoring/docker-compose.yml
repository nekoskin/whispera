version: '3.8'

services:
  prometheus:
    image: prom/prometheus:latest
    container_name: whispera-prometheus
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/etc/prometheus/console_libraries'
      - '--web.console.templates=/etc/prometheus/consoles'
      - '--web.enable-lifecycle'
    ports:
      - "9092:9090"  # Expose on 9092 to avoid conflict with Server (9091) and Client (9090)
      # Wait, config.go says DefaultServerConfig metrics listen addr is :9090.
      # So Prometheus cannot bind to 9090 on host if Whispera is already there.
      # We should map 9091:9090 or just not expose it if we use Grafana.
      # Let's map 9091 for safety.
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped
    networks:
      - whispera-mon-net

  grafana:
    image: grafana/grafana:latest
    container_name: whispera-grafana
    volumes:
      - grafana_data:/var/lib/grafana
      - ./datasources:/etc/grafana/provisioning/datasources
      # - ./dashboards:/etc/grafana/provisioning/dashboards
    environment:
      - GF_SECURITY_ADMIN_USER=${GF_ADMIN_USER:-admin}
      - GF_SECURITY_ADMIN_PASSWORD=${GF_ADMIN_PASSWORD:?Set GF_ADMIN_PASSWORD in .env}
      - GF_USERS_ALLOW_SIGN_UP=false
    ports:
      - "3001:3000"
    restart: unless-stopped
    networks:
      - whispera-mon-net

networks:
  whispera-mon-net:
    driver: bridge

volumes:
  prometheus_data:
  grafana_data:
