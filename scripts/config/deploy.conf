# Whispera Deployment Configuration
# This file contains all configurable parameters for deployment

# Go configuration
GO_VERSION="1.23.4"
GO_MIN_VERSION="1.16"
GO_TOOLCHAIN="go1.23.4"

# Dependency versions (compatible with Go 1.23)
CRYPTO_VERSION="v0.41.0"
NET_VERSION="v0.43.0"
SYS_VERSION="v0.35.0"
TEXT_VERSION="v0.28.0"

# Network configuration
SERVER_PORT="51820"
SERVER_TCP_PORT="4443"
SERVER_WS_PORT="8080"
SERVER_WS2_PORT="8443"
API_PORT="8081"
METRICS_PORT="9101"

# Paths
WORK_DIR="/opt/whispera"
CONFIG_DIR="${WORK_DIR}/config"
LOG_DIR="${WORK_DIR}/logs"
DATA_DIR="${WORK_DIR}/data"

# Service configuration
SERVICE_NAME="whispera-server"
SERVICE_USER="root"

# TUN configuration
TUN_INTERFACE="whispera0"
TUN_IP="10.0.0.1/24"
TUN_CLIENT_IP="10.0.0.2/24"
TUN_MTU="1420"

# Security
GRAFANA_PASSWORD="${GRAFANA_PASSWORD:-whispera123}"

# Features
ENABLE_ML="${ENABLE_ML:-true}"
ENABLE_MONITORING="${ENABLE_MONITORING:-true}"
ENABLE_AUTO_PROFILE="${ENABLE_AUTO_PROFILE:-true}"

# Obfuscation profiles
FTE_PROFILE="http2"
MARIONETTE_PROFILE="browser"
RUSSIAN_SERVICE="vk"

