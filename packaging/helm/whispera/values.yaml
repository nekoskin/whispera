# Default values for whispera
replicaCount: 3

image:
  repository: whispera
  pullPolicy: IfNotPresent
  tag: "latest"

nameOverride: ""
fullnameOverride: ""

serviceAccount:
  create: true
  annotations: {}
  name: ""

podAnnotations:
  prometheus.io/scrape: "true"
  prometheus.io/port: "9101"
  prometheus.io/path: "/metrics"

podSecurityContext:
  runAsNonRoot: true
  runAsUser: 1000
  runAsGroup: 1000
  fsGroup: 1000

securityContext:
  allowPrivilegeEscalation: false
  capabilities:
    drop:
    - ALL
  readOnlyRootFilesystem: true
  runAsNonRoot: true
  runAsUser: 1000

service:
  type: LoadBalancer
  ports:
    udp: 51820
    tcp: 4443
    websocket: 8443
    metrics: 9101

ingress:
  enabled: false
  className: ""
  annotations: {}
  hosts:
    - host: whispera.example.com
      paths:
        - path: /
          pathType: Prefix
  tls: []

resources:
  limits:
    cpu: 1000m
    memory: 2Gi
  requests:
    cpu: 500m
    memory: 1Gi

autoscaling:
  enabled: false
  minReplicas: 3
  maxReplicas: 10
  targetCPUUtilizationPercentage: 80
  targetMemoryUtilizationPercentage: 80

nodeSelector: {}

tolerations: []

affinity:
  podAntiAffinity:
    preferredDuringSchedulingIgnoredDuringExecution:
    - weight: 100
      podAffinityTerm:
        labelSelector:
          matchExpressions:
          - key: app
            operator: In
            values:
            - whispera-server
        topologyKey: kubernetes.io/hostname

persistence:
  enabled: true
  storageClass: ""
  accessMode: ReadWriteOnce
  size: 10Gi

config:
  server:
    listen: ":51820"
    listen_tcp: ":4443"
    listen_ws: ":8443"
    metrics: ":9101"
    auto_profile: true
    monitoring: true
  
  obfuscation:
    fte_profile: "http2"
    marionette_profile: "browser"
    ai_evasion: true
    hardware_evasion: true
    behavioral_mimicry: true

secrets:
  server_key: ""

monitoring:
  enabled: true
  prometheus:
    enabled: true
    port: 9101
    path: "/metrics"
  grafana:
    enabled: true
    dashboard: "whispera"

ml:
  enabled: true
  model_caching: true
  feature_caching: true
  batch_size: 32
  parallel_processing: true
