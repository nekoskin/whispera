# Whispera Alerting Rules
groups:
  - name: whispera.rules
    rules:
      # High Error Rate
      - alert: HighErrorRate
        expr: rate(whispera_errors_total[5m]) > 0.1
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: "High error rate detected"
          description: "Whispera error rate is {{ $value }} errors per second"

      # High Latency
      - alert: HighLatency
        expr: histogram_quantile(0.95, rate(whispera_request_duration_seconds_bucket[5m])) > 1
        for: 3m
        labels:
          severity: warning
        annotations:
          summary: "High latency detected"
          description: "95th percentile latency is {{ $value }}s"

      # Low Throughput
      - alert: LowThroughput
        expr: rate(whispera_requests_total[5m]) < 10
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Low throughput detected"
          description: "Request rate is {{ $value }} requests per second"

      # DPI Evasion Failure
      - alert: DPIEvasionFailure
        expr: rate(whispera_dpi_evasion_failures_total[5m]) > 0.05
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "DPI evasion failures detected"
          description: "DPI evasion failure rate is {{ $value }} failures per second"

      # ML Model Performance Degradation
      - alert: MLModelDegradation
        expr: whispera_ml_model_accuracy < 0.8
        for: 2m
        labels:
          severity: warning
        annotations:
          summary: "ML model performance degraded"
          description: "ML model accuracy is {{ $value }}"

      # High Memory Usage
      - alert: HighMemoryUsage
        expr: (whispera_memory_usage_bytes / whispera_memory_limit_bytes) > 0.9
        for: 2m
        labels:
          severity: warning
        annotations:
          summary: "High memory usage"
          description: "Memory usage is {{ $value | humanizePercentage }}"

      # High CPU Usage
      - alert: HighCPUUsage
        expr: rate(whispera_cpu_usage_seconds_total[5m]) > 0.8
        for: 3m
        labels:
          severity: warning
        annotations:
          summary: "High CPU usage"
          description: "CPU usage is {{ $value | humanizePercentage }}"

      # Connection Failures
      - alert: ConnectionFailures
        expr: rate(whispera_connection_failures_total[5m]) > 0.1
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "Connection failures detected"
          description: "Connection failure rate is {{ $value }} failures per second"

      # Data Pipeline Issues
      - alert: DataPipelineIssues
        expr: rate(whispera_data_pipeline_errors_total[5m]) > 0.01
        for: 2m
        labels:
          severity: warning
        annotations:
          summary: "Data pipeline issues detected"
          description: "Data pipeline error rate is {{ $value }} errors per second"

      # Model Training Failures
      - alert: ModelTrainingFailures
        expr: rate(whispera_model_training_failures_total[5m]) > 0.01
        for: 2m
        labels:
          severity: warning
        annotations:
          summary: "Model training failures detected"
          description: "Model training failure rate is {{ $value }} failures per second"

      # Security Threats
      - alert: SecurityThreats
        expr: rate(whispera_security_threats_total[5m]) > 0.1
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "Security threats detected"
          description: "Security threat rate is {{ $value }} threats per second"

      # Service Down
      - alert: ServiceDown
        expr: up{job=~"whispera.*"} == 0
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "Whispera service is down"
          description: "{{ $labels.job }} service is down"

      # Certificate Expiry
      - alert: CertificateExpiry
        expr: whispera_certificate_expiry_seconds < 7 * 24 * 3600
        for: 1h
        labels:
          severity: warning
        annotations:
          summary: "Certificate expiring soon"
          description: "Certificate expires in {{ $value | humanizeDuration }}"
