map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

upstream whispera_origin {
    server origin.internal.example.com:8443;
    keepalive 16;
}

server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name cdn.yourname.example;

    ssl_certificate     /etc/letsencrypt/live/cdn.yourname.example/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/cdn.yourname.example/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305;
    ssl_prefer_server_ciphers on;

    location = /healthz {
        access_log off;
        return 200 "ok\n";
    }

    location /ws {
        if ($arg_t != "REPLACE_WITH_WHISPERA_ACCESS_TOKEN") {
            return 401;
        }

        proxy_pass               https://whispera_origin;
        proxy_http_version       1.1;
        proxy_set_header Host    origin.internal.example.com;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_set_header X-Forwarded-For   $remote_addr;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_ssl_server_name on;
        proxy_ssl_verify      off;

        proxy_read_timeout  3600s;
        proxy_send_timeout  3600s;
        proxy_buffering     off;
        proxy_request_buffering off;
    }

    location / {
        return 404;
    }
}

server {
    listen      80;
    listen      [::]:80;
    server_name cdn.yourname.example;
    return 301  https://$host$request_uri;
}
