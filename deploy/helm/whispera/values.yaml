replicaCount: 1

image:
  repository: whispera/server
  tag: latest
  pullPolicy: IfNotPresent

server:
  listenAddr: ":8080"
  apiAddr: ":8081"
  resources:
    requests:
      cpu: 250m
      memory: 256Mi
    limits:
      cpu: "2"
      memory: 1Gi

panel:
  enabled: true
  replicaCount: 1
  image:
    repository: whispera/panel
    tag: latest
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 512Mi

postgresql:
  enabled: true
  auth:
    postgresPassword: whispera
    database: whispera
  primary:
    persistence:
      size: 10Gi

redis:
  enabled: true
  architecture: standalone
  auth:
    enabled: false

nats:
  enabled: true
  nats:
    jetstream:
      enabled: true

prometheus:
  enabled: true
  server:
    retention: 30d
    persistentVolume:
      size: 20Gi

grafana:
  enabled: false

ingress:
  enabled: false
  className: nginx
  hosts:
    - host: whispera.local
      paths:
        - path: /
          pathType: Prefix
  tls: []

persistence:
  enabled: true
  size: 5Gi
  storageClass: ""

config:
  adminUsername: admin
  adminPassword: ""
  configPath: /etc/whispera/config.yaml

autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 5
  targetCPUUtilizationPercentage: 70

nodeSelector: {}
tolerations: []
affinity: {}
