{{- if .Values.panel.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Release.Name }}-panel
  labels:
    app: whispera
    component: panel
spec:
  replicas: {{ .Values.panel.replicaCount | default 1 }}
  selector:
    matchLabels:
      app: whispera
      component: panel
  template:
    metadata:
      labels:
        app: whispera
        component: panel
    spec:
      containers:
        - name: panel
          image: "{{ .Values.panel.image.repository }}:{{ .Values.panel.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: http
              containerPort: 3000
              protocol: TCP
          env:
            - name: BACKEND_URL
              value: "http://{{ .Release.Name }}-server:8081"
            - name: PORT
              value: "3000"
          resources:
            {{- toYaml .Values.panel.resources | nindent 12 }}
          livenessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 10
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
{{- end }}
