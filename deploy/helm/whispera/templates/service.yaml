apiVersion: v1
kind: Service
metadata:
  name: {{ .Release.Name }}-server
  labels:
    app: whispera
    component: server
spec:
  type: ClusterIP
  ports:
    - name: tunnel
      port: 8080
      targetPort: tunnel
      protocol: TCP
    - name: api
      port: 8081
      targetPort: api
      protocol: TCP
    - name: metrics
      port: 9090
      targetPort: metrics
      protocol: TCP
  selector:
    app: whispera
    component: server
---
{{- if .Values.panel.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: {{ .Release.Name }}-panel
  labels:
    app: whispera
    component: panel
spec:
  type: ClusterIP
  ports:
    - name: http
      port: 3000
      targetPort: 3000
      protocol: TCP
  selector:
    app: whispera
    component: panel
{{- end }}
