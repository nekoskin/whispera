apiVersion: v1
kind: Secret
metadata:
  name: {{ .Release.Name }}-secrets
  labels:
    app: whispera
type: Opaque
stringData:
  admin-username: {{ .Values.config.adminUsername | quote }}
  admin-password: {{ .Values.config.adminPassword | default (randAlphaNum 32) | quote }}
  database-url: "postgresql://whispera:{{ .Values.postgresql.auth.postgresPassword }}@{{ .Release.Name }}-postgresql:5432/{{ .Values.postgresql.auth.database }}?sslmode=disable"
