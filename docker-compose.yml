version: '3.8'

services:
  # Whispera Server - Production Ready
  whispera-server:
    build: 
      context: .
      dockerfile: Dockerfile
      target: production
    container_name: whispera-server
    ports:
      - "51820:51820/udp"
      - "4443:4443/tcp"
      - "8443:8443/tcp"
      - "9101:9101/tcp"
      - "8080:8080/tcp"
    environment:
      - WHISPERA_STATIC_KEY=${WHISPERA_STATIC_KEY:-your-server-private-key}
      - WHISPERA_AUTO_PROFILE=true
      - WHISPERA_MONITORING=true
      - WHISPERA_SPEEDTEST=true
      - WHISPERA_SPEEDTEST_SERVER=http://whispera-speedtest:8080
      - WHISPERA_LOG_LEVEL=info
      - WHISPERA_METRICS_ENABLED=true
      - WHISPERA_ML_ENABLED=true
      - WHISPERA_ML_SERVER=http://whispera-ml:8000
      - WHISPERA_PRODUCTION_MODE=true
      - WHISPERA_CORE_ENABLE=1
      - WHISPERA_CORE_RULES=1
      - WHISPERA_CORE_EVASION=1
    volumes:
      - ./config:/etc/whispera:ro
      - ./logs:/var/log/whispera
      - whispera-data:/var/lib/whispera
    cap_add:
      - NET_ADMIN
      - NET_BIND_SERVICE
    restart: unless-stopped
    networks:
      - whispera-net
    depends_on:
      - whispera-speedtest
      - whispera-ml
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    deploy:
      resources:
        limits:
          memory: 2G
          cpus: '1.0'
        reservations:
          memory: 1G
          cpus: '0.5'

  # Whispera Speedtest Server
  whispera-speedtest:
    build: .
    container_name: whispera-speedtest
    command: ["./whispera-speedtest-server", "-port", ":8080"]
    ports:
      - "8080:8080/tcp"
    restart: unless-stopped
    networks:
      - whispera-net

  # Whispera ML Engine API
  whispera-ml:
    build:
      context: .
      dockerfile: ml_engine/Dockerfile
    container_name: whispera-ml
    ports:
      - "8000:8000/tcp"
    environment:
      - WHISPERA_CORS_ORIGINS=*
      - PYTHONUNBUFFERED=1
    volumes:
      - ./ml_engine/models:/app/models:ro
      - ./ml_engine/production_data:/app/production_data:rw
      - ml-models-data:/app/models_cache
    restart: unless-stopped
    networks:
      - whispera-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      start-period: 20s
      retries: 3
    deploy:
      resources:
        limits:
          memory: 2G
          cpus: '1.0'
        reservations:
          memory: 512M
          cpus: '0.25'

  # Prometheus Monitoring
  prometheus:
    image: prom/prometheus:latest
    container_name: whispera-prometheus
    ports:
      - "9090:9090/tcp"
    volumes:
      - ./packaging/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/etc/prometheus/console_libraries'
      - '--web.console.templates=/etc/prometheus/consoles'
      - '--storage.tsdb.retention.time=200h'
      - '--web.enable-lifecycle'
    restart: unless-stopped
    networks:
      - whispera-net

  # Grafana Dashboard
  grafana:
    image: grafana/grafana:latest
    container_name: whispera-grafana
    ports:
      - "3000:3000/tcp"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_PASSWORD:-whispera123}
      - GF_USERS_ALLOW_SIGN_UP=false
      - GF_SECURITY_DISABLE_GRAVATAR=true
    volumes:
      - grafana-storage:/var/lib/grafana
      - ./packaging/grafana/dashboard.json:/etc/grafana/provisioning/dashboards/whispera.json:ro
    restart: unless-stopped
    networks:
      - whispera-net
    depends_on:
      - prometheus

  # Whispera Client (optional, for testing)
  whispera-client:
    build: .
    container_name: whispera-client
    command: ["./cmd/client", "-server", "whispera-server:51820"]
    environment:
      - WHISPERA_CLIENT_KEY=${WHISPERA_CLIENT_KEY:-your-client-private-key}
      - WHISPERA_CORE_ENABLE=1
      - WHISPERA_CORE_RULES=1
      - WHISPERA_CORE_EVASION=1
    volumes:
      - ./client_config.yaml:/etc/whispera/client.yaml:ro
    restart: "no"
    networks:
      - whispera-net
    depends_on:
      - whispera-server
    profiles:
      - client

volumes:
  grafana-storage:
  prometheus-data:
  whispera-data:
  ml-models-data:

networks:
  whispera-net:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/16