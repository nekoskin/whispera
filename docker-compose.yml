services:
  server:
    build: .
    container_name: whispera-server
    restart: unless-stopped
    ports:
      - "8443:8443/tcp"
      - "8443:8443/udp"
      - "8080:8080"
    volumes:
      - ./config.yaml:/etc/whispera/config.yaml:ro
      - whispera-logs:/var/log/whispera
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      - WHISPERA_MASK_LOGS=true
    networks:
      - whispera

  panel:
    build: .
    container_name: whispera-panel
    restart: unless-stopped
    entrypoint: ["node", "panel/dist/main"]
    working_dir: /opt/whispera
    ports:
      - "3000:3000"
    environment:
      - PORT=3000
      - BACKEND_URL=http://server:8080
      - CORS_ORIGIN=*
    depends_on:
      - server
    networks:
      - whispera

  postgres:
    image: postgres:16-alpine
    container_name: whispera-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: whispera
      POSTGRES_PASSWORD: ${PG_PASSWORD:-changeme}
      POSTGRES_DB: whispera
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U whispera"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - whispera

  redis:
    image: redis:7-alpine
    container_name: whispera-redis
    restart: unless-stopped
    command: redis-server --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - whispera

volumes:
  postgres-data:
  redis-data:
  whispera-logs:

networks:
  whispera:
    driver: bridge
