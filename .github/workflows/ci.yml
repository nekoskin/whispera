name: CI/CD Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version: '1.25.x'
        cache: true

    - name: Tidy dependencies
      run: |
        go mod tidy
        git diff --exit-code go.mod go.sum

    - name: Download dependencies
      run: go mod download

    - name: Run golangci-lint
      uses: golangci/golangci-lint-action@v7
      with:
        version: v2.11.3
        args: --timeout=5m

    - name: Run go vet
      run: go vet ./...

  test:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version: '1.25.x'
        cache: true

    - name: Download dependencies
      run: go mod download

    - name: Run tests with race detector
      run: go test -race -count=1 -coverprofile=coverage.out -covermode=atomic ./...

    - name: Check coverage threshold
      run: |
        COVERAGE=$(go tool cover -func=coverage.out | grep total | awk '{print $3}' | sed 's/%//')
        echo "Total coverage: ${COVERAGE}%"
        if (( $(echo "$COVERAGE < 5" | bc -l) )); then
          echo "::warning::Coverage is below 5%: ${COVERAGE}%"
        fi

    - name: Upload coverage
      uses: codecov/codecov-action@v4
      with:
        file: ./coverage.out
        fail_ci_if_error: false

  build:
    runs-on: ubuntu-latest
    needs: [lint, test]
    steps:
    - uses: actions/checkout@v4

    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version: '1.25.x'
        cache: true

    - name: Download dependencies
      run: go mod download

    - name: Build
      run: |
        CGO_ENABLED=0 go build -trimpath -ldflags="-s -w" -o client ./cmd/client
        CGO_ENABLED=0 go build -trimpath -ldflags="-s -w" -o server ./cmd/server

    - name: Test build artifacts
      run: |
        ./client --help || true
        ./server --help || true

    - name: Upload artifacts
      uses: actions/upload-artifact@v4
      with:
        name: binaries
        path: |
          client
          server
        retention-days: 7
