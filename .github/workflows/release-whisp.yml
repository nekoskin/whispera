name: Release Whisp Client

on:
  push:
    branches: [main]
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: write

jobs:
  # ── Build whispera-ml-server.exe (Windows, PyInstaller) ──────────────────
  build-ml-server:
    name: Build ML Server (Windows)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install PyInstaller + API deps
        run: |
          pip install pyinstaller fastapi uvicorn pydantic numpy scikit-learn joblib scipy python-multipart cryptography
          pip install onnxruntime skl2onnx --quiet
          pip install tensorflow-cpu --quiet || echo "TensorFlow not available, using heuristics only"

      - name: Train ONNX models
        run: python ml_engine/train_onnx_models.py

      - name: Build whispera-ml-server.exe
        working-directory: internal/obfuscation/ml
        run: pyinstaller whispera-ml-server.spec --clean --noconfirm

      - name: Upload ML server binary
        uses: actions/upload-artifact@v4
        with:
          name: whispera-ml-server-windows
          path: internal/obfuscation/ml/dist/whispera-ml-server.exe
          retention-days: 5

  # ── Build whispera-go-client.exe ─────────────────────────────────────────
  build-go-client:
    name: Build Go Client (Windows)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v4
        with:
          go-version: '1.24.x'

      - name: Build
        env:
          GOOS: windows
          GOARCH: amd64
          CGO_ENABLED: 0
        run: |
          go build -ldflags "-s -w -X main.Version=${{ github.ref_name }}" `
            -o whispera-go-client-x86_64-pc-windows-msvc.exe ./cmd/client

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: whispera-go-client-windows
          path: whispera-go-client-x86_64-pc-windows-msvc.exe
          retention-days: 5

  # ── Build Tauri app ───────────────────────────────────────────────────────
  build-whisp:
    name: Build Whisp (Windows)
    runs-on: windows-latest
    needs: [build-ml-server, build-go-client]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Download ML server
        uses: actions/download-artifact@v4
        with:
          name: whispera-ml-server-windows
          path: whisp/src-tauri/binaries/

      - name: Download Go client
        uses: actions/download-artifact@v4
        with:
          name: whispera-go-client-windows
          path: whisp/src-tauri/binaries/

      # mihomo binary must be placed manually or downloaded here
      # For now we create a stub so Tauri doesn't error on missing sidecar
      - name: Ensure mihomo stub exists
        shell: bash
        run: |
          if [ ! -f "whisp/src-tauri/binaries/mihomo-x86_64-pc-windows-msvc.exe" ]; then
            echo "mihomo stub" > whisp/src-tauri/binaries/mihomo-x86_64-pc-windows-msvc.exe
          fi

      # Place ml-server.exe next to the final .exe (not as Tauri sidecar, just bundled)
      - name: Stage ML server for bundling
        shell: bash
        run: |
          cp whisp/src-tauri/binaries/whispera-ml-server.exe \
             whisp/src-tauri/whispera-ml-server.exe || true

      - name: Install frontend deps
        working-directory: whisp
        run: npm ci

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          projectPath: whisp
          includeDebug: false
          includeRelease: true

      - name: Copy ML server into installer bundle
        shell: bash
        run: |
          find whisp/src-tauri/target/release/bundle -name "*.exe" -not -name "whispera-ml-server.exe" | head -1 | xargs -I{} dirname {} | xargs -I{} cp whisp/src-tauri/binaries/whispera-ml-server.exe {}/ || true

      - name: Upload Whisp installer
        uses: actions/upload-artifact@v4
        with:
          name: whisp-windows-installer
          path: |
            whisp/src-tauri/target/release/bundle/nsis/*.exe
            whisp/src-tauri/target/release/bundle/msi/*.msi
          retention-days: 5

  # ── GitHub Release ────────────────────────────────────────────────────────
  release-whisp:
    name: Release Whisp
    runs-on: ubuntu-latest
    needs: build-whisp
    if: startsWith(github.ref, 'refs/tags/') || github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/download-artifact@v4
        with:
          name: whisp-windows-installer
          path: release-whisp/

      - name: Calculate version
        id: ver
        run: |
          git fetch --tags
          BASE="v1.0.0"
          LAST=$(git tag -l "${BASE}.*" | sort -V | tail -n1)
          if [ -z "$LAST" ]; then NEW="${BASE}.1"
          else PATCH=$(echo "$LAST" | awk -F. '{print $3}'); NEW="${BASE}.$((PATCH+1))"; fi
          echo "tag=$NEW" >> $GITHUB_OUTPUT

      - name: Upload release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.ver.outputs.tag }}
          name: Whisp Client ${{ steps.ver.outputs.tag }}
          files: release-whisp/**
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
