name: Release Server

on:
  push:
    branches:
      - "main"
    tags:
      - 'v*'
    paths-ignore:
      - '**.md'
      - 'LICENSE**'
      - 'Dockerfile*'
      - 'docker-compose*.yml'
      - '.dockerignore'
      - 'k8s/**'
      - 'kubernetes/**'
      - 'helm/**'
      - 'docs/**'
      - '.github/ISSUE_TEMPLATE/**'
      - '.github/PULL_REQUEST_TEMPLATE*'
      - 'whisp/**'
      - '**.py'
      - 'install.sh'
      - 'update.sh'
      - 'scripts/**'
      - 'monitoring/**'
      - 'deploy/**'
      - 'Makefile'
      - 'docker-compose*.yml'
      - '.claude/**'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  prepare:
    name: Compute version
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.v.outputs.version }}
      build_time: ${{ steps.v.outputs.build_time }}
      git_commit: ${{ steps.v.outputs.git_commit }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - id: v
        run: |
          git fetch --tags --force 2>/dev/null || true
          if [ "${GITHUB_REF#refs/tags/}" != "$GITHUB_REF" ]; then
            VERSION="${GITHUB_REF#refs/tags/}"
          else
            BASE="v1.0.0"
            LAST_TAG=$(git tag -l "${BASE}.*" | sort -V | tail -n1)
            if [ -z "$LAST_TAG" ]; then
              VERSION="${BASE}.1"
            else
              LAST_PATCH=$(echo "$LAST_TAG" | awk -F. '{print $NF}')
              VERSION="${BASE}.$((LAST_PATCH + 1))"
            fi
          fi
          BUILD_TIME=$(date -u +%Y-%m-%dT%H:%M:%SZ)
          GIT_COMMIT=$(git rev-parse --short HEAD)
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "build_time=$BUILD_TIME" >> "$GITHUB_OUTPUT"
          echo "git_commit=$GIT_COMMIT" >> "$GITHUB_OUTPUT"
          echo "Computed: version=$VERSION build_time=$BUILD_TIME commit=$GIT_COMMIT"

  build-server:
    name: Build Server (${{ matrix.goarch }})
    runs-on: ubuntu-latest
    needs: prepare
    strategy:
      matrix:
        include:
          - goos: linux
            goarch: amd64
            asset_name: whispera-server-linux-amd64
          - goos: linux
            goarch: arm64
            asset_name: whispera-server-linux-arm64

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      - uses: actions/setup-go@v4
        with:
          go-version: '1.25.x'

      - name: Build
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: 0
          VERSION: ${{ needs.prepare.outputs.version }}
          BUILD_TIME: ${{ needs.prepare.outputs.build_time }}
          GIT_COMMIT: ${{ needs.prepare.outputs.git_commit }}
        run: |
          go build -ldflags "-s -w -X main.Version=$VERSION -X main.BuildTime=$BUILD_TIME -X main.GitCommit=$GIT_COMMIT" -o whispera-server ./cmd/server

      - name: Archive Server
        run: tar -czvf ${{ matrix.asset_name }}.tar.gz whispera-server

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset_name }}
          path: ${{ matrix.asset_name }}.tar.gz
          retention-days: 5

  build-go-client:
    name: Build Go Client (${{ matrix.triple }})
    runs-on: ubuntu-latest
    needs: prepare
    strategy:
      matrix:
        include:
          - goos: windows
            goarch: amd64
            triple: x86_64-pc-windows-msvc
            ext: .exe
          - goos: linux
            goarch: amd64
            triple: x86_64-unknown-linux-gnu
            ext: ""
          - goos: linux
            goarch: arm64
            triple: aarch64-unknown-linux-gnu
            ext: ""
          - goos: darwin
            goarch: amd64
            triple: x86_64-apple-darwin
            ext: ""
          - goos: darwin
            goarch: arm64
            triple: aarch64-apple-darwin
            ext: ""
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v4
        with:
          go-version: '1.25.x'

      - name: Build
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: 0
          VERSION: ${{ needs.prepare.outputs.version }}
        run: |
          go build -ldflags "-s -w -X main.Version=$VERSION" \
            -o whispera-go-client-${{ matrix.triple }}${{ matrix.ext }} ./cmd/client

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: whispera-go-client-${{ matrix.triple }}
          path: whispera-go-client-${{ matrix.triple }}${{ matrix.ext }}
          retention-days: 5

  build-go-client-android:
    name: Build Go Client (Android ARM64)
    runs-on: ubuntu-latest
    needs: prepare
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v4
        with:
          go-version: '1.25.x'

      - name: Build
        env:
          GOOS: android
          GOARCH: arm64
          CGO_ENABLED: 0
          VERSION: ${{ needs.prepare.outputs.version }}
        run: |
          go build -ldflags "-s -w -X main.Version=$VERSION" \
            -o whispera-go-client-aarch64-linux-android ./cmd/client

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: whispera-go-client-android
          path: whispera-go-client-aarch64-linux-android
          retention-days: 5

  build-ml-server:
    name: Build ML Server (${{ matrix.triple }})
    runs-on: ubuntu-latest
    needs: prepare
    strategy:
      matrix:
        include:
          - goos: windows
            goarch: amd64
            triple: x86_64-pc-windows-msvc
            ext: .exe
          - goos: linux
            goarch: amd64
            triple: x86_64-unknown-linux-gnu
            ext: ""
          - goos: linux
            goarch: arm64
            triple: aarch64-unknown-linux-gnu
            ext: ""
          - goos: darwin
            goarch: amd64
            triple: x86_64-apple-darwin
            ext: ""
          - goos: darwin
            goarch: arm64
            triple: aarch64-apple-darwin
            ext: ""
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v4
        with:
          go-version: '1.25.x'

      - name: Build
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: 0
          VERSION: ${{ needs.prepare.outputs.version }}
        run: |
          go build -ldflags "-s -w -X main.Version=$VERSION" \
            -o whispera-ml-server-${{ matrix.triple }}${{ matrix.ext }} ./cmd/mlserver

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: whispera-ml-server-${{ matrix.triple }}
          path: whispera-ml-server-${{ matrix.triple }}${{ matrix.ext }}
          retention-days: 5

  build-panel:
    name: Build Panel
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: panel/package-lock.json

      - name: Install & Build Panel
        working-directory: ./panel
        run: |
          npm ci --legacy-peer-deps
          chmod -R +x node_modules/.bin/
          npm run build
          npm run bundle
          echo "bundle size: $(du -sh bundle | cut -f1)"
          tar -czvf ../whispera-panel.tar.gz bundle public package.json .env.example
          echo "whispera-panel.tar.gz: $(du -sh ../whispera-panel.tar.gz | cut -f1)"

      - name: Upload Panel Artifact
        uses: actions/upload-artifact@v4
        with:
          name: whispera-panel
          path: whispera-panel.tar.gz
          retention-days: 5


  release:
    name: Create Release
    runs-on: ubuntu-latest
    needs: [prepare, build-server, build-panel, build-go-client, build-go-client-android, build-ml-server]
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/test' || startsWith(github.ref, 'refs/tags/')
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download All Artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Collect Release Files
        run: |
          mkdir -p release-files
          find artifacts -type f -name '*.tar.gz' -exec cp {} release-files/ \;
          find artifacts -type f -name 'whispera-go-client-*' -exec cp {} release-files/ \;
          find artifacts -type f -name 'whispera-ml-server-*' -exec cp {} release-files/ \;
          echo "Release files:"
          ls -la release-files/

      - name: Generate Release Notes
        id: notes
        run: |
          git fetch --tags --force
          if [ "${GITHUB_REF#refs/tags/}" != "$GITHUB_REF" ]; then
            CURRENT="${GITHUB_REF#refs/tags/}"
            PREV=$(git tag -l 'v*' --sort=-v:refname | awk -v cur="$CURRENT" '$0 != cur { print; exit }')
            HEAD_REF="$CURRENT"
          else
            CURRENT="${{ needs.prepare.outputs.version }}"
            PREV=$(git tag -l 'v*' --sort=-v:refname | head -n1)
            HEAD_REF="HEAD"
          fi
          if [ -n "$PREV" ]; then
            RANGE="${PREV}..${HEAD_REF}"
          else
            RANGE="$HEAD_REF"
          fi
          echo "range=$RANGE prev=$PREV current=$CURRENT"

          bash scripts/changelog.sh "$RANGE" > notes.md
          {
            echo "body<<RELEASE_NOTES_EOF"
            cat notes.md
            echo ""
            if [ -n "$PREV" ]; then
              echo "**Full Changelog**: https://github.com/${{ github.repository }}/compare/${PREV}...${CURRENT}"
            fi
            echo "RELEASE_NOTES_EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Upload Tag Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: release-files/*
          body: ${{ steps.notes.outputs.body }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload Test Branch Release
        if: github.ref == 'refs/heads/main'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.prepare.outputs.version }}
          target_commitish: ${{ github.sha }}
          name: Whispera-Core ${{ needs.prepare.outputs.version }}
          body: ${{ steps.notes.outputs.body }}
          prerelease: false
          files: release-files/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Trigger Whisp Client rebuild
        if: github.ref == 'refs/heads/main'
        uses: peter-evans/repository-dispatch@v3
        with:
          token: ${{ secrets.WHISP_DISPATCH_TOKEN }}
          repository: Jalaveyan/Whisp
          event-type: upstream-release
          client-payload: '{"version": "${{ needs.prepare.outputs.version }}"}'
