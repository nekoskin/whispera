name: Panel CI

on:
  push:
    branches: [main, develop]
    paths:
      - 'panel/**'
      - '.github/workflows/panel.yml'
  pull_request:
    branches: [main]
    paths:
      - 'panel/**'
      - '.github/workflows/panel.yml'

permissions:
  contents: read

jobs:
  build:
    name: Build bundle
    runs-on: ubuntu-latest
    outputs:
      bundle-sha: ${{ steps.bundle.outputs.sha }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: panel/package-lock.json

      - name: Install
        working-directory: panel
        run: npm ci --legacy-peer-deps --include=dev

      - name: Lint
        working-directory: panel
        run: npm run lint -- --max-warnings=0 || true

      - name: Test
        working-directory: panel
        run: npm test -- --passWithNoTests --ci

      - name: Build + bundle
        id: bundle
        working-directory: panel
        run: |
          npm run build
          npm run bundle
          sha=$(sha256sum bundle/index.js | cut -d' ' -f1)
          echo "sha=$sha" >> "$GITHUB_OUTPUT"
          echo "bundle/index.js sha256=$sha"

      - uses: actions/upload-artifact@v4
        with:
          name: panel-bundle
          path: |
            panel/bundle/
            panel/public/
            panel/package.json
          retention-days: 7

  smoke:
    name: Boot on ${{ matrix.distro }}
    runs-on: ubuntu-latest
    needs: build
    strategy:
      fail-fast: false
      matrix:
        include:
          - distro: ubuntu-22.04
            image: node:20-bullseye-slim
            libc: glibc
          - distro: debian-12
            image: node:20-bookworm-slim
            libc: glibc
          - distro: alpine-3.20
            image: node:20-alpine
            libc: musl
          - distro: rockylinux-9
            image: rockylinux:9
            libc: glibc
            install_node: true
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: panel-bundle
          path: panel

      - name: Boot bundle in ${{ matrix.distro }}
        run: |
          cat > run.sh <<'EOF'
          set -eu
          if [ "${INSTALL_NODE:-0}" = "1" ]; then
            curl -fsSL https://rpm.nodesource.com/setup_20.x | bash -
            dnf install -y nodejs >/dev/null
          fi
          node --version
          cd /work/panel
          PORT=3000 HOST=127.0.0.1 node bundle/index.js &
          pid=$!
          for i in $(seq 1 30); do
            if wget -q -O /dev/null http://127.0.0.1:3000/ 2>/dev/null \
               || wget -q -O /dev/null http://127.0.0.1:3000/api 2>/dev/null; then
              echo "panel responding on ${{ matrix.distro }} (${{ matrix.libc }})"
              kill $pid 2>/dev/null || true
              exit 0
            fi
            sleep 1
          done
          echo "panel did not respond within 30s" >&2
          kill $pid 2>/dev/null || true
          exit 1
          EOF
          chmod +x run.sh
          docker run --rm \
            -v "$PWD:/work" \
            -w /work \
            -e INSTALL_NODE=${{ matrix.install_node && '1' || '0' }} \
            ${{ matrix.image }} \
            sh /work/run.sh
